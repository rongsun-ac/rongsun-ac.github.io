biography:
  label: "プロフィール"
  title: "孫 栄"
  paragraphs:
    - "**役職**  \nリサーチレジデント"
    - "**プロフィール**  \n2014年に中国の寧夏医科大学にて医学学位（M.D.）を取得し，2018年に同大学にて医科学修士号を取得した．修士課程在学中には，島根大学医学部において1年間，交換留学生としてがん研究に従事した．2018年島根大学医学部博士課程に進学し，2022年に同大学大学院医学系研究科にて博士（医学）を取得した．同年，中国の上海交通大学医学部附属第六人民医院にて内科医師として勤務を開始した．2026年4月より，愛知県がんセンター 腫瘍制御学分野にてがん研究に従事している．"
    - "**主要研究テーマ**  \nがん細胞におけるシグナル伝達異常と細胞間情報伝達機構の統合理解を目指し，特にSrcシグナルおよび細胞外小胞に着目して，薬剤耐性および腫瘍進展の分子基盤を解明する．"
    - "**メッセージ**  \n臨床に根ざした課題を起点として，その細胞・分子レベルでの機構解明と臨床応用への展開を志向した研究に取り組んでいます．基礎研究と臨床をつなぐトランスレーショナルリサーチを通じて，がん治療の発展に寄与することを目指しています．"
