# Add one top-level entry per news item.
# News is shared across English, Japanese, and Chinese pages.
# IDs use news_YYYY_MM_DD_NN. The news page sorts entries by Japanese fiscal year and date.
# display: true shows the news item; display: false hides the news item.
# Markdown links are supported in title and text fields.

