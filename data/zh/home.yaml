biography:
  label: "个人简介"
  title: "关于孙荣"
  paragraphs:
    - "**职位**  \nResearch Resident"
    - "**个人简介**  \n孙荣博士于2014年在中国宁夏医科大学获得医学学位（M.D.），并于2018年在同校获得医学科学硕士学位。硕士期间，她曾作为交换留学生在日本岛根大学医学部学习一年，并从事癌症研究。2018年，她进入岛根大学医学部博士课程学习，并于2022年在岛根大学大学院医学系研究科获得博士（医学）学位，研究方向聚焦于胸部恶性肿瘤中的抗癌药物耐药机制。同年，她开始在上海交通大学医学院附属第六人民医院担任内科医师。自2026年4月起，她在爱知县癌症中心肿瘤抑制领域从事癌症研究。"
    - "**主要研究方向**  \n她的研究旨在综合理解癌症中的异常信号通路与细胞间信息传递机制，尤其关注Src信号通路和细胞外囊泡，致力于阐明药物耐药和肿瘤进展的分子基础，并将相关发现转化为克服耐药的新型治疗策略和药物发现。"
    - "**寄语**  \n她的研究以临床问题为出发点，关注细胞与分子层面的机制解析，并探索其向临床实践转化的可能性。她希望通过连接基础医学与临床医学的转化研究，为癌症治疗的发展作出贡献。"
